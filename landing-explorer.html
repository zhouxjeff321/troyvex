<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troy VEX — Landing Page Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f12;--bar:#16191e;--line:#262b32;--txt:#e7e9ec;--mut:#8a919b;--red:#b12a34;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{background:var(--bar);border-bottom:1px solid var(--line);padding:.7rem 1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  .title{font-weight:700;font-size:.95rem;white-space:nowrap}
  .title span{color:var(--mut);font-weight:400}
  .tabs{display:flex;gap:.4rem;flex-wrap:wrap}
  .tab{background:transparent;border:1px solid var(--line);color:var(--mut);padding:.45rem .8rem;border-radius:9px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap;text-align:left}
  .tab:hover{color:var(--txt);border-color:#3a414a}
  .tab.active{background:var(--red);border-color:var(--red);color:#fff}
  .tab b{display:block;font-size:.64rem;font-weight:400;opacity:.7;margin-top:1px}
  .spacer{flex:1}
  .ctrl{display:flex;gap:.4rem;align-items:center}
  .ctrl button{background:transparent;border:1px solid var(--line);color:var(--mut);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1rem;font-family:inherit}
  .ctrl button:hover{color:var(--txt);border-color:#3a414a}
  .ctrl button.on{background:#23272e;color:var(--txt);border-color:#3a414a}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:#0a0b0d;position:relative}
  .framewrap{height:100%;width:100%;display:flex;justify-content:center;background:#0a0b0d;transition:width .3s}
  iframe{border:0;width:100%;height:100%;background:#fff}
  .framewrap.mobile{width:430px;box-shadow:0 0 0 1px var(--line)}
  .framewrap.tablet{width:834px;box-shadow:0 0 0 1px var(--line)}
  .hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:.72rem;color:var(--mut);background:rgba(22,25,30,.85);border:1px solid var(--line);padding:.35rem .8rem;border-radius:20px;backdrop-filter:blur(6px)}
  @media(max-width:760px){.title span{display:none}.tab b{display:none}}
</style>
</head>
<body>
  <header>
    <div class="title">Troy VEX <span>· Landing Pages (recolored to current scheme)</span></div>
    <div class="tabs" id="tabs">
      <button type="button" class="tab active" data-src="landing-previews/apple.html">Apple<b>vitrine</b></button>
      <button type="button" class="tab" data-src="landing-previews/ventriloc.html">Ventriloc<b>console</b></button>
      <button type="button" class="tab" data-src="landing-previews/cursor.html">Cursor<b>warm editorial</b></button>
      <button type="button" class="tab" data-src="landing-previews/shuttle.html">Shuttle<b>white void</b></button>
      <button type="button" class="tab" data-src="landing-previews/stripe.html">Stripe<b>gradient</b></button>
      <button type="button" class="tab" data-src="landing-previews/elevenlabs.html">ElevenLabs<b>parchment</b></button>
      <button type="button" class="tab" data-src="landing-previews/easehealth.html">Ease Health<b>clinical serif</b></button>
      <button type="button" class="tab" data-src="landing-previews/orderful.html">Orderful<b>command deck</b></button>
      <button type="button" class="tab" data-src="landing-previews/handhold.html">Handhold<b>monograph</b></button>
    </div>
    <div class="spacer"></div>
    <div class="ctrl">
      <button type="button" id="prev" title="Previous (←)">‹</button>
      <button type="button" id="next" title="Next (→)">›</button>
      <span style="width:1px;height:22px;background:var(--line);margin:0 .2rem"></span>
      <button type="button" id="d-desktop" class="on" title="Desktop">▭</button>
      <button type="button" id="d-tablet" title="Tablet">▢</button>
      <button type="button" id="d-mobile" title="Mobile">▯</button>
      <span style="width:1px;height:22px;background:var(--line);margin:0 .2rem"></span>
      <button type="button" id="open" title="Open in new tab">↗</button>
    </div>
  </header>
  <div class="stage">
    <div class="framewrap" id="framewrap"><iframe id="frame" src="landing-previews/apple.html"></iframe></div>
    <div class="hint">← → arrows to switch · toggle device width on the right · ↗ opens full screen</div>
  </div>

<script>
  const tabs=[...document.querySelectorAll('.tab')];
  const frame=document.getElementById('frame');
  const wrap=document.getElementById('framewrap');
  let idx=0;
  function show(i){
    idx=(i+tabs.length)%tabs.length;
    tabs.forEach((t,n)=>t.classList.toggle('active',n===idx));
    frame.src=tabs[idx].dataset.src;
  }
  tabs.forEach((t,n)=>t.addEventListener('click',()=>show(n)));
  document.getElementById('prev').onclick=()=>show(idx-1);
  document.getElementById('next').onclick=()=>show(idx+1);
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')show(idx-1);
    if(e.key==='ArrowRight')show(idx+1);
  });
  const devs={'d-desktop':'','d-tablet':'tablet','d-mobile':'mobile'};
  Object.keys(devs).forEach(id=>{
    document.getElementById(id).onclick=()=>{
      wrap.className='framewrap'+(devs[id]?' '+devs[id]:'');
      Object.keys(devs).forEach(x=>document.getElementById(x).classList.toggle('on',x===id));
    };
  });
  document.getElementById('open').onclick=()=>window.open(tabs[idx].dataset.src,'_blank');
</script>
</body>
</html>
