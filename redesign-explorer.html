<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troy VEX - Homepage Redesign Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e10;
    --bar: #16181d;
    --panel: #1f2229;
    --line: #2c3039;
    --text: #f0f2f5;
    --muted: #9aa1ad;
    --red: #b12a34;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
    background: var(--bg);
    color: var(--text);
    font-family: "Geist", system-ui, sans-serif;
  }
  button { font: inherit; }
  .toolbar {
    background: var(--bar);
    border-bottom: 1px solid var(--line);
    padding: 10px 12px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .title {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 190px;
  }
  .mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--red);
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 12px;
  }
  .title b { display: block; font-size: 14px; line-height: 1.1; }
  .title span { color: var(--muted); font-size: 12px; }
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 1px;
  }
  .tab {
    border: 1px solid var(--line);
    color: var(--muted);
    background: transparent;
    border-radius: 8px;
    min-width: 156px;
    padding: 8px 10px;
    text-align: left;
    cursor: pointer;
  }
  .tab:hover { border-color: #444956; color: var(--text); }
  .tab.active { background: var(--red); border-color: var(--red); color: #fff; }
  .tab strong { display: block; font-size: 13px; line-height: 1.15; }
  .tab span { display: block; opacity: .76; font-size: 11px; margin-top: 2px; }
  .controls {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
  }
  .control {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    min-height: 36px;
    padding: 8px 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
  }
  .control:hover { color: var(--text); border-color: #444956; }
  .control.active { background: var(--panel); color: var(--text); border-color: #444956; }
  .divider { width: 1px; height: 24px; background: var(--line); margin: 0 2px; }
  .stage {
    position: relative;
    min-width: 0;
    min-height: 0;
    overflow: auto;
    background:
      linear-gradient(45deg, #0a0b0d 25%, transparent 25%) 0 0 / 18px 18px,
      linear-gradient(45deg, transparent 75%, #0a0b0d 75%) 0 0 / 18px 18px,
      #08090b;
  }
  .framewrap {
    height: 100%;
    min-height: 100%;
    width: 100%;
    margin: 0 auto;
    background: #fff;
    transition: width .2s ease;
  }
  .framewrap.tablet { width: 834px; box-shadow: 0 0 0 1px var(--line), 0 20px 80px rgba(0,0,0,.45); }
  .framewrap.mobile { width: 430px; box-shadow: 0 0 0 1px var(--line), 0 20px 80px rgba(0,0,0,.45); }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; }
  .hint {
    position: absolute;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    color: var(--muted);
    background: rgba(22,24,29,.9);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12px;
    pointer-events: none;
    backdrop-filter: blur(10px);
  }
  @media (max-width: 920px) {
    body { overflow: auto; height: auto; min-height: 100vh; }
    .toolbar { grid-template-columns: 1fr; }
    .controls { justify-content: flex-start; flex-wrap: wrap; }
    .stage { height: calc(100vh - 190px); }
    .framewrap.tablet, .framewrap.mobile { width: 100%; }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <header class="toolbar">
    <div class="title">
      <div class="mark">TV</div>
      <div><b>Troy VEX</b><span>Homepage redesign explorer</span></div>
    </div>
    <div class="tabs" id="tabs" role="tablist" aria-label="Homepage redesign concepts">
      <button class="tab active" type="button" data-src="redesigns/design1.html"><strong>01 Command Deck</strong><span>Dark operational homepage</span></button>
      <button class="tab" type="button" data-src="redesigns/design2.html"><strong>02 Championship Editorial</strong><span>Story-first prestige layout</span></button>
      <button class="tab" type="button" data-src="redesigns/design3.html"><strong>03 Team Atlas</strong><span>Photo-led team directory</span></button>
      <button class="tab" type="button" data-src="redesigns/design4.html"><strong>04 Sponsor Mission</strong><span>Recruiting and support funnel</span></button>
      <button class="tab" type="button" data-src="redesigns/design5.html"><strong>05 Season Timeline</strong><span>Results-driven season story</span></button>
    </div>
    <div class="controls" aria-label="Explorer controls">
      <button class="control" type="button" id="prev">Prev</button>
      <button class="control" type="button" id="next">Next</button>
      <span class="divider" aria-hidden="true"></span>
      <button class="control active" type="button" data-device="">Desktop</button>
      <button class="control" type="button" data-device="tablet">Tablet</button>
      <button class="control" type="button" data-device="mobile">Mobile</button>
      <span class="divider" aria-hidden="true"></span>
      <button class="control" type="button" id="open">Open current</button>
    </div>
  </header>
  <main class="stage">
    <div class="framewrap" id="framewrap">
      <iframe id="frame" title="Selected Troy VEX homepage redesign" src="redesigns/design1.html"></iframe>
    </div>
    <div class="hint">Use tabs, number keys 1-5, or left/right arrow keys.</div>
  </main>
<script>
  const tabs = [...document.querySelectorAll(".tab")];
  const frame = document.getElementById("frame");
  const wrap = document.getElementById("framewrap");
  let active = 0;

  function setActive(index) {
    active = (index + tabs.length) % tabs.length;
    tabs.forEach((tab, i) => {
      const selected = i === active;
      tab.classList.toggle("active", selected);
      tab.setAttribute("aria-selected", selected ? "true" : "false");
    });
    frame.src = tabs[active].dataset.src;
    history.replaceState(null, "", `#${active + 1}`);
  }

  tabs.forEach((tab, index) => tab.addEventListener("click", () => setActive(index)));
  document.getElementById("prev").addEventListener("click", () => setActive(active - 1));
  document.getElementById("next").addEventListener("click", () => setActive(active + 1));
  document.getElementById("open").addEventListener("click", () => {
    const opened = window.open(tabs[active].dataset.src, "_blank", "noopener,noreferrer");
    if (opened) opened.opener = null;
  });

  document.querySelectorAll("[data-device]").forEach((button) => {
    button.addEventListener("click", () => {
      wrap.className = `framewrap ${button.dataset.device}`.trim();
      document.querySelectorAll("[data-device]").forEach((item) => item.classList.toggle("active", item === button));
    });
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "ArrowLeft") setActive(active - 1);
    if (event.key === "ArrowRight") setActive(active + 1);
    if (/^[1-5]$/.test(event.key)) setActive(Number(event.key) - 1);
  });

  const initial = Number(location.hash.replace("#", ""));
  if (initial >= 1 && initial <= tabs.length) setActive(initial - 1);
</script>
</body>
</html>
