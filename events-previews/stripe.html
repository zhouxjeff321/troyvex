<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Stripe style</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#b12a34;--red-br:#e0656d;--navy:#0d1b3a;--ink:#061b31;--steel:#50617a;--slate:#64748d;--canvas:#fff;--mist:#f6f9fc;--line:#e6ebf1;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Manrope',sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .top{position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
  .halo{position:absolute;top:-180px;right:-140px;width:680px;height:520px;z-index:0;filter:blur(20px);transform:skewY(-8deg);
    background:radial-gradient(closest-side,rgba(177,42,52,.45),transparent 70%),radial-gradient(closest-side at 70% 60%,rgba(13,27,58,.4),transparent 70%),radial-gradient(closest-side at 30% 80%,rgba(224,101,109,.45),transparent 70%)}
  .wrap{max-width:960px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
  nav{height:64px;display:flex;align-items:center;gap:24px;font-size:14px;font-weight:500}
  nav .b{font-weight:700;font-size:18px}nav .links{display:flex;gap:20px;color:var(--steel)}nav .right{margin-left:auto}
  nav .cta{background:var(--red);color:#fff;border-radius:9999px;padding:7px 15px;font-weight:600}
  .hero{padding:56px 0 60px}
  .hero .ey{font-size:14px;color:var(--slate);font-weight:600}
  .hero h1{font-size:54px;font-weight:300;letter-spacing:-1.6px;margin:12px 0 14px;background:linear-gradient(110deg,var(--red),var(--navy) 80%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{font-size:18px;color:var(--steel);max-width:48ch}
  .seg{display:inline-flex;gap:4px;margin-top:24px;border:1px solid var(--line);border-radius:9999px;padding:3px;background:#fff}
  .seg a{font-size:14px;font-weight:600;padding:7px 18px;border-radius:9999px;color:var(--steel)}
  .seg a.on{background:var(--red);color:#fff}
  /* list */
  #ev-list{max-width:960px;margin:0 auto;padding:40px 24px 0}
  .ev{display:grid;grid-template-columns:90px 1fr auto;gap:24px;align-items:center;padding:20px 4px;border-bottom:1px solid var(--line)}
  .ev-date{display:flex;flex-direction:column}
  .ev-mo{font-size:12px;font-weight:700;color:var(--red);letter-spacing:.04em}
  .ev-day{font-size:30px;font-weight:300;line-height:1;letter-spacing:-1px}
  .ev-yr{font-size:12px;color:var(--slate)}
  .ev-name{font-size:19px;font-weight:600}
  .ev-loc{font-size:14px;color:var(--steel);margin-top:2px}
  .ev-detail{font-size:13px;color:var(--slate);margin-top:3px}
  .ev-tag{font-size:12px;font-weight:600;color:var(--red);white-space:nowrap}
  .ev-major .ev-tag{color:#fff;background:var(--navy);padding:4px 10px;border-radius:4px}
  /* calendar */
  #cal-view{max-width:960px;margin:0 auto;padding:64px 24px 80px}
  #cal-view .ey{font-size:14px;color:var(--red);font-weight:600}
  #cal-view h2{font-size:34px;font-weight:300;letter-spacing:-1px;margin:6px 0 22px}
  #cal{border:1px solid var(--line);border-radius:4px;padding:24px;background:var(--mist)}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-title{font-size:18px;font-weight:600}
  .cal-head button{width:32px;height:32px;border:1px solid var(--line);background:#fff;border-radius:4px;cursor:pointer;color:var(--ink)}
  .cal-head button:disabled{opacity:.3}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{text-align:center;font-size:11px;color:var(--slate);font-weight:600;padding-bottom:4px}
  .cal-cell{min-height:80px;background:#fff;border:1px solid var(--line);border-radius:4px;padding:6px}
  .cal-empty{background:transparent;border:none}
  .cal-has{border-color:var(--red)}
  .cal-num{font-size:12px;color:var(--slate)}
  .cal-has .cal-num{color:var(--red);font-weight:700}
  .cal-ev{display:block;font-size:10px;line-height:1.25;margin-top:3px;color:var(--ink);font-weight:500}
  .cal-ev.ev-major{color:var(--red)}
  footer{border-top:1px solid var(--line);text-align:center;padding:30px;color:var(--slate);font-size:13px}
  @media(max-width:680px){nav .links{display:none}.hero h1{font-size:38px}.ev{grid-template-columns:74px 1fr}.ev-tag{display:none}.cal-cell{min-height:54px}.cal-ev{font-size:0;height:6px;width:6px;border-radius:50%;background:var(--red);margin-top:3px}}
</style>
</head>
<body>
  <div class="top">
    <div class="halo"></div>
    <div class="wrap">
      <nav><span class="b">Troy VEX</span><span class="links"><a>Teams</a><a>Events</a><a>Awards</a></span><span class="right"><a class="cta">Donate</a></span></nav>
      <header class="hero">
        <div class="ey">2025–26 Season</div>
        <h1>Competition Schedule</h1>
        <p>The complete season — from California qualifiers to the VEX world stage in St. Louis.</p>
        <div class="seg"><a class="on">List</a><a data-scroll-cal href="#cal-view">Calendar</a></div>
      </header>
    </div>
  </div>
  <main id="ev-list"></main>
  <section id="cal-view">
    <div class="ey">Season at a glance</div>
    <h2>Calendar</h2>
    <div id="cal">
      <div class="cal-head"><span class="cal-title"></span><span><button data-prev>‹</button> <button data-next>›</button></span></div>
      <div class="cal-grid"></div>
    </div>
  </section>
  <footer>© 2026 Troy High School VEX Robotics · Fullerton, CA</footer>
  <script src="shared.js"></script>
</body>
</html>
