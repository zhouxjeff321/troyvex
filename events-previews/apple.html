<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Apple style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#b12a34;--navy:#0d1b3a;--graphite:#1d1d1f;--fog:#707070;--cloud:#f5f5f7;--bone:#e2e2e5;--paper:#fff;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--cloud);color:var(--graphite);-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .nav{height:44px;display:flex;align-items:center;justify-content:center;gap:30px;background:rgba(251,251,253,.8);backdrop-filter:blur(18px);font-size:12px;position:sticky;top:0;z-index:10}
  .nav .b{font-weight:700}.nav a{opacity:.8}
  .wrap{max-width:880px;margin:0 auto;padding:0 22px}
  .hero{text-align:center;padding:72px 0 30px}
  .hero .ey{color:var(--red);font-size:19px;font-weight:600}
  .hero h1{font-size:48px;letter-spacing:-1px;font-weight:700;margin:.2em 0 .15em}
  .hero p{font-size:19px;font-weight:300;color:var(--fog)}
  .seg{display:inline-flex;background:var(--bone);border-radius:980px;padding:3px;margin-top:26px}
  .seg a{font-size:14px;font-weight:500;padding:7px 18px;border-radius:980px;color:var(--graphite)}
  .seg a.on{background:var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  /* list */
  #ev-list{margin:40px 0 0;background:var(--paper);border-radius:18px;overflow:hidden}
  .ev{display:grid;grid-template-columns:64px 1fr auto;gap:22px;align-items:center;padding:22px 26px;border-bottom:1px solid var(--cloud)}
  .ev:last-child{border-bottom:none}
  .ev-date{text-align:center}
  .ev-mo{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--red)}
  .ev-day{display:block;font-size:26px;font-weight:600;line-height:1;letter-spacing:-.02em}
  .ev-yr{display:block;font-size:11px;color:var(--fog)}
  .ev-name{font-size:18px;font-weight:600;letter-spacing:-.01em}
  .ev-loc{font-size:14px;color:var(--fog);margin-top:2px}
  .ev-detail{font-size:13px;color:var(--graphite);opacity:.7;margin-top:4px}
  .ev-tag{font-size:12px;font-weight:600;color:var(--red);background:rgba(177,42,52,.08);padding:4px 12px;border-radius:980px;white-space:nowrap}
  .ev-major .ev-tag{color:#fff;background:var(--navy)}
  /* calendar */
  #cal-view{padding:60px 0 80px}
  #cal-view h2{text-align:center;font-size:28px;letter-spacing:-.5px;margin-bottom:6px}
  #cal-view .sub{text-align:center;color:var(--fog);font-size:15px;margin-bottom:26px}
  #cal{background:var(--paper);border-radius:18px;padding:26px}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:18px}
  .cal-title{font-size:19px;font-weight:600;min-width:190px;text-align:center}
  .cal-head button{width:34px;height:34px;border:none;background:var(--cloud);border-radius:980px;cursor:pointer;font-size:16px;color:var(--graphite)}
  .cal-head button:disabled{opacity:.3;cursor:default}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-dow{text-align:center;font-size:11px;color:var(--fog);font-weight:600;padding-bottom:6px}
  .cal-cell{min-height:78px;border-radius:10px;background:var(--cloud);padding:7px 8px}
  .cal-empty{background:transparent}
  .cal-has{background:#fff;box-shadow:inset 0 0 0 1.5px var(--red)}
  .cal-num{font-size:12px;color:var(--fog)}
  .cal-has .cal-num{color:var(--graphite);font-weight:600}
  .cal-ev{display:block;font-size:10px;line-height:1.2;margin-top:4px;color:var(--red);font-weight:500}
  .cal-ev.ev-major{color:var(--navy)}
  footer{text-align:center;padding:30px;color:var(--fog);font-size:12px}
  @media(max-width:680px){.nav a:not(.b){display:none}.hero h1{font-size:34px}.ev{grid-template-columns:54px 1fr;gap:14px}.ev-tag{display:none}.cal-cell{min-height:56px}.cal-ev{font-size:0;height:6px;width:6px;border-radius:50%;background:var(--red);margin-top:3px}.cal-ev.ev-major{background:var(--navy)}}
</style>
</head>
<body>
  <nav class="nav"><span class="b">Troy VEX</span><a>Teams</a><a>Events</a><a>Awards</a><a>Donate</a></nav>
  <div class="wrap">
    <header class="hero">
      <div class="ey">2025–26 Season</div>
      <h1>Competition Schedule</h1>
      <p>Every event from California qualifiers to the world stage.</p>
      <div class="seg"><a class="on">List</a><a data-scroll-cal href="#cal-view">Calendar</a></div>
    </header>
    <main id="ev-list"></main>
    <section id="cal-view">
      <h2>Season Calendar</h2>
      <p class="sub">Browse the season month by month.</p>
      <div id="cal">
        <div class="cal-head"><button data-prev>‹</button><span class="cal-title"></span><button data-next>›</button></div>
        <div class="cal-grid"></div>
      </div>
    </section>
  </div>
  <footer>© 2026 Troy High School VEX Robotics · Fullerton, CA</footer>
  <script src="shared.js"></script>
</body>
</html>
